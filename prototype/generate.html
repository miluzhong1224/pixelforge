<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>PixelForge — 创作页原型</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0d0d0d;color:#ececee;overflow:hidden;height:100vh}

/* ===== CSS Variables ===== */
:root{
  --canvas:#13161a;
  --panel:#1c1f24;
  --raised:#242830;
  --inset:#15181d;
  --hover:#2c3038;
  --border-faint:#2a2d35;
  --border:#353945;
  --text:#e0e0e4;
  --sub:#8b8b96;
  --muted:#5e5e66;
  --signal:#5b7fff;
  --signal-hover:#7b9fff;
  --glass-bg:rgba(26,26,28,0.78);
  --glass-border:rgba(255,255,255,0.06);
}

/* ===== Layout ===== */
.app{display:flex;flex-direction:column;height:100vh}

/* TopBar */
.topbar{
  height:44px;flex-shrink:0;
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--signal)}
.logo-text{font-weight:700;font-size:14px;color:var(--text)}
.topbar-nav{display:flex;gap:4px}
.topbar-nav button{
  background:none;border:none;color:var(--sub);font-size:13px;
  padding:6px 14px;border-radius:6px;cursor:pointer;transition:all 0.15s;
}
.topbar-nav button.active{color:var(--text);background:var(--raised)}
.topbar-nav button:hover{color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{width:28px;height:28px;border-radius:4px;background:var(--signal);
  display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:white}

/* Main content */
.main{display:flex;flex:1;overflow:hidden}

/* Left Panel */
.left-panel{
  width:320px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--border-faint);
  display:flex;flex-direction:column;
  user-select:none;
}

/* Panel sections */
.panel-section{
  padding:16px;
  border-bottom:1px solid var(--border-faint);
}
.panel-section:last-child{border-bottom:none}
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  height:32px;padding:0 8px;margin-bottom:12px;
  background:var(--raised);border-radius:4px;border-left:2px solid var(--border);
}
.section-title.active{border-left-color:var(--signal)}
.section-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--sub);
}
.section-badge{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted)}

/* Mode tabs */
.mode-tabs{
  display:flex;gap:2px;margin-bottom:16px;
  background:var(--inset);border-radius:6px;padding:2px;
}
.mode-tab{
  flex:1;background:none;border:none;color:var(--sub);
  font-size:11px;padding:8px 12px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;gap:6px;justify-content:center;
  transition:all 0.15s;
}
.mode-tab.active{background:var(--raised);color:var(--text)}
.mode-tab:hover:not(.active){color:var(--text)}

/* Inputs */
.textarea{
  width:100%;min-height:80px;resize:vertical;
  background:var(--inset);border:1px solid var(--border);
  border-radius:4px;padding:10px 12px;font-size:13px;line-height:1.5;
  color:var(--text);font-family:inherit;
  outline:none;transition:border-color 0.12s;
}
.textarea::placeholder{color:var(--muted)}
.textarea:focus{border-color:var(--signal)}

.input-row{display:flex;gap:8px;margin-top:8px}
.btn-ghost{
  background:none;border:none;color:var(--signal);font-size:10px;
  padding:4px 8px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:background 0.1s;
}
.btn-ghost:hover{background:rgba(91,127,255,0.1)}

/* Template button */
.btn-template{
  width:100%;padding:10px;margin-top:8px;
  background:var(--inset);border:1px dashed var(--border);
  border-radius:6px;color:var(--sub);font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.15s;
}
.btn-template:hover{border-color:var(--signal);color:var(--text);background:rgba(91,127,255,0.04)}

/* Dimension grid */
.dim-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
}
.dim-btn{
  background:var(--inset);border:1px solid var(--border-faint);
  border-radius:4px;color:var(--sub);font-size:10px;
  padding:8px 6px;cursor:pointer;transition:all 0.12s;
}
.dim-btn:hover{border-color:var(--border)}
.dim-btn.active{background:rgba(91,127,255,0.08);border-color:var(--signal);color:var(--text)}

/* Sliders */
.slider-group{margin-bottom:12px}
.slider-label{
  display:flex;justify-content:space-between;margin-bottom:4px;
}
.slider-label span:first-child{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--sub);
}
.slider-val{
  font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)
}
input[type="range"]{
  -webkit-appearance:none;width:100%;height:2px;
  background:var(--border);border-radius:1px;outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--text);border:1px solid var(--border);cursor:pointer;
}

/* Generate button */
.btn-generate{
  width:100%;height:40px;margin-top:8px;
  background:var(--signal);color:white;border:none;border-radius:20px;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all 0.15s;
}
.btn-generate:hover{background:var(--signal-hover)}
.btn-generate:active{transform:scale(0.98)}

.btn-edit{
  width:100%;height:36px;margin-top:8px;
  background:var(--raised);color:var(--text);border:1px solid var(--border);
  border-radius:6px;font-size:12px;cursor:pointer;
  transition:all 0.15s;
}
.btn-edit:hover{background:var(--hover)}

/* Canvas */
.canvas-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:var(--canvas);
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:24px 24px;
  position:relative;
}
.canvas-placeholder{
  width:400px;height:400px;
  border:1px dashed var(--border);
  border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;
}
.canvas-placeholder-icon{font-size:48px;opacity:0.3}
.canvas-placeholder-text{font-size:13px;color:var(--muted)}

/* Corner marks */
.canvas-placeholder::before,.canvas-placeholder::after{
  content:'';position:absolute;width:12px;height:12px;border-color:var(--border);
}
/* Coord readout */
.coord-readout{
  position:absolute;bottom:16px;right:16px;
  font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);
  background:var(--glass-bg);backdrop-filter:blur(12px);
  padding:6px 12px;border-radius:4px;border:1px solid var(--glass-border);
}

/* Image grid */
.image-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:24px;width:100%;max-width:600px;
}
.image-grid-item{
  aspect-ratio:1;
  background:var(--inset);border:2px solid transparent;border-radius:8px;
  transition:border-color 0.15s;
}
.image-grid-item:hover{border-color:var(--border)}
.image-grid-item.active{border-color:var(--signal)}

/* Scrollbar */
.left-panel::-webkit-scrollbar{width:4px}
.left-panel::-webkit-scrollbar-thumb{background:var(--border-faint);border-radius:2px}

/* Toast */
.toast{
  position:fixed;top:60px;right:20px;z-index:200;
  background:var(--raised);border:1px solid var(--border);
  padding:12px 20px;border-radius:8px;font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.toast.success{border-left:2px solid #22c55e}

/* ===== Micro-interactions ===== */
.mode-tab{transition:all 0.2s cubic-bezier(0.16,1,0.3,1)}
.mode-tab:hover:not(.active){transform:translateY(-1px)}
.mode-tab.active{transform:translateY(0)}
.btn-generate{position:relative;overflow:hidden}
.btn-generate::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:translateX(-100%);
}
.btn-generate:hover::after{transform:translateX(100%);transition:transform 0.4s ease}
.btn-generate:active{transform:scale(0.97)}
.btn-ghost{transition:all 0.15s ease}
.btn-ghost:hover{transform:translateX(2px)}
.btn-template{transition:all 0.2s ease}
.btn-template:hover{transform:translateY(-1px)}
.dim-btn,.mode-tab{transition:all 0.15s cubic-bezier(0.16,1,0.3,1)}
.dim-btn:hover{transform:scale(1.02)}
.image-grid-item{transition:all 0.2s ease}
.image-grid-item:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.image-grid-item.active{transform:scale(1.02);box-shadow:0 0 0 2px var(--signal),0 4px 24px rgba(91,127,255,0.25)}
input[type="range"]::-webkit-slider-thumb{transition:all 0.15s ease}
input[type="range"]:hover::-webkit-slider-thumb{transform:scale(1.2);background:var(--signal)}
.textarea{transition:border-color 0.15s ease,box-shadow 0.15s ease}
.textarea:focus{box-shadow:0 0 0 3px rgba(91,127,255,0.12)}
.canvas-placeholder{animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.8}50%{opacity:0.5}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-fadeInUp{animation:fadeInUp 0.3s ease-out}
.btn-generate.loading{pointer-events:none;opacity:0.8}
.btn-generate.loading::before{
  content:'';display:inline-block;width:14px;height:14px;margin-right:8px;
  border:2px solid rgba(255,255,255,0.2);border-top-color:white;
  border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-edit{transition:all 0.2s ease}
.btn-edit:hover{transform:translateY(-1px);box-shadow:0 2px 12px rgba(91,127,255,0.15)}
.topbar{transition:background 0.3s ease}
</style>
</head>
<body>

<div class="app">
  <!-- TopBar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-dot"></span>
      <span class="logo-text">PixelForge</span>
    </div>
    <nav class="topbar-nav">
      <button class="active">创作</button>
      <button>我的</button>
      <button>发现</button>
    </nav>
    <div class="topbar-right">
      <div class="avatar">M</div>
    </div>
  </header>

  <!-- Main -->
  <div class="main">
    <!-- Left Panel -->
    <aside class="left-panel" style="overflow-y:auto">
      <!-- Mode tabs -->
      <div class="panel-section">
        <div class="mode-tabs">
          <button class="mode-tab active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 4V2m0 2v2m0-2h-4.5M3 10v9a2 2 0 002 2h14a2 2 0 002-2v-9M3 10l3-5m-3 5h18m0 0l-3-5"/></svg>
            文生图
          </button>
          <button class="mode-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            图生图
          </button>
          <button class="mode-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            反向
          </button>
        </div>

        <!-- Prompt -->
        <div class="section-title active">
          <span class="section-label">Prompt</span>
          <span class="section-badge">0 / 500</span>
        </div>
        <textarea class="textarea" placeholder="描述你想生成的图像&#10;例如: 电影感的日落山景，金色光线，写实风格..."></textarea>
        <div class="input-row">
          <button class="btn-ghost">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            AI 优化翻译
          </button>
          <button class="btn-ghost">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            历史
          </button>
        </div>
        <button class="btn-template">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          浏览 Prompt 模板库（12 套风格预设）
        </button>
      </div>

      <!-- Negative Prompt -->
      <div class="panel-section">
        <div class="section-title">
          <span class="section-label">Negative Prompt</span>
        </div>
        <textarea class="textarea" style="min-height:50px" placeholder="模糊、低质量、扭曲..."></textarea>
      </div>

      <!-- Dimensions -->
      <div class="panel-section">
        <div class="section-title">
          <span class="section-label">Dimensions</span>
        </div>
        <div class="dim-grid">
          <button class="dim-btn active">正方形 1:1<br><span style="opacity:0.5;font-size:9px">1024×1024</span></button>
          <button class="dim-btn">小红书 3:4<br><span style="opacity:0.5;font-size:9px">1080×1440</span></button>
          <button class="dim-btn">朋友圈 1:1<br><span style="opacity:0.5;font-size:9px">1080×1080</span></button>
          <button class="dim-btn">竖版 3:4<br><span style="opacity:0.5;font-size:9px">768×1024</span></button>
          <button class="dim-btn">公众号封面<br><span style="opacity:0.5;font-size:9px">900×383</span></button>
          <button class="dim-btn">横版 4:3<br><span style="opacity:0.5;font-size:9px">1280×960</span></button>
          <button class="dim-btn">电商主图<br><span style="opacity:0.5;font-size:9px">800×800</span></button>
          <button class="dim-btn">宽屏 16:9<br><span style="opacity:0.5;font-size:9px">1280×720</span></button>
        </div>
      </div>

      <!-- Parameters -->
      <div class="panel-section">
        <div class="section-title active">
          <span class="section-label">Parameters</span>
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>steps</span>
            <span class="slider-val">30</span>
          </div>
          <input type="range" min="1" max="50" value="30">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>cfg scale</span>
            <span class="slider-val">7.5</span>
          </div>
          <input type="range" min="1" max="20" step="0.5" value="7.5">
        </div>
      </div>

      <!-- Generate -->
      <div class="panel-section">
        <button class="btn-generate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:middle"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l4 8-3 7-5-2 4-13z"/></svg>
          生成
        </button>
        <button class="btn-edit">二次编辑（局部重绘）</button>
      </div>
    </aside>

    <!-- Canvas -->
    <main class="canvas-area">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:600px">
          <div class="image-grid-item active" style="display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.2">R1</div>
          <div class="image-grid-item" style="display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.15">R2</div>
          <div class="image-grid-item" style="display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.15">R3</div>
          <div class="image-grid-item" style="display:flex;align-items:center;justify-content:center;font-size:32px;opacity:0.15">R4</div>
        </div>
        <div class="canvas-placeholder" style="position:relative">
          <div class="canvas-placeholder-icon">&#x1F5BC;</div>
          <div class="canvas-placeholder-text">选择一张结果预览</div>
        </div>
      </div>
      <div class="coord-readout">X: 1024 &nbsp; Y: 1024 &nbsp; &nbsp; 100%</div>
    </main>
  </div>
</div>

<!-- Toast -->
<div class="toast success">
  <span style="color:#22c55e;margin-right:6px">&#x2714;</span>
  生成完成！4 张结果就绪
</div>

</body>
</html>
